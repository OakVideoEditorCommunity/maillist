min_connections = 2
connect_timeout = 10
idle_timeout = 300

[security]
jwt_secret = "4pR0RlFl4ommdn5qcxUE7SAM2Be1iENz1ArRdMxwAV3I1ZtvtMqAfiY02oGurE4S"
