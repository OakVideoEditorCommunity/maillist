name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  binary:
    name: Build Linux x86_64 Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --workspace

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/oak-maillist dist/
          cp target/release/migration dist/
          cd dist
          tar czf oak-maillist-linux-x86_64.tar.gz oak-maillist migration

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oak-maillist-linux-x86_64
          path: dist/oak-maillist-linux-x86_64.tar.gz

  release:
    name: Create GitHub Release
    needs: [binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: oak-maillist-linux-x86_64
          path: release-assets

      - name: Generate checksum
        run: |
          cd release-assets
          sha256sum -- *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
